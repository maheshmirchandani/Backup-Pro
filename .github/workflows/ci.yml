name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install golangci-lint
        run: |
          VERSION=$(cat scripts/golangci-version.txt)
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v$VERSION
      - name: Lint
        run: make lint
      - name: Test (unit + integration)
        run: make test
      - name: Test (faultinject)
        run: make test-faultinject
      - name: Coverage gate
        run: make coverage
      - name: Release symbol-scan
        run: make verify-release

  e2e-fast:
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: e2e-fast (PR-gating)
        run: make e2e-fast

  e2e-safety:
    needs: test
    runs-on: macos-14
    # PS2: e2e-safety is flaky-tolerant on PR; only blocks main push
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: e2e-safety (faultinject + hdiutil)
        run: make e2e-safety

  bench:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Bench (main only; artifact upload, no gate yet)
        run: make bench | tee bench.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.sha }}
          path: bench.txt
